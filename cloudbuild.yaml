# Optional CI/CD: connect this repo as a Cloud Build trigger (Console ->
# Cloud Build -> Triggers -> Connect repository) to auto-build + deploy on push
# to main. Redeploys preserve env vars/secrets set on the service at first deploy,
# so none are repeated here. Manual deploys use `gcloud run deploy --source .`.
substitutions:
  _REGION: us-central1
  _SERVICE: counterpoint-api
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$SHORT_SHA
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$SHORT_SHA
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --allow-unauthenticated
      - --no-cpu-throttling
      - --min-instances=0
      - --max-instances=1
      - --concurrency=20
      - --timeout=3600
      - --memory=1Gi
options:
  logging: CLOUD_LOGGING_ONLY
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$SHORT_SHA
