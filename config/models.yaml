# LLM model configuration.
#
# HARD RULE (from build plan): model IDs are config-driven, never hardcoded in
# pipeline code. Split usage:
#   - extraction: high-volume claim extraction  -> Claude Haiku 4.5 (cheap/fast)
#   - judgment:   low-volume contradiction calls -> Claude Sonnet 5 (stronger)
#
# Swap a model by editing the `model` field here; nothing downstream changes.

# Provider registry. Each pipeline role (extraction/judgment) names a provider
# here, so swapping backends is a one-line change — never hardcoded in code.
providers:
  ollama:                       # Ollama Cloud hosted inference (OpenAI-ish)
    type: ollama
    host_env: OLLAMA_HOST
    api_key_env: OLLAMA_API_KEY
  vertex:                       # Gemini via Vertex AI (needs aiplatform API enabled)
    type: vertex
    project_env: GOOGLE_CLOUD_PROJECT
    location_env: GOOGLE_CLOUD_LOCATION

# High-volume claim extraction. (Swap provider->vertex, model->gemini-2.5-flash
# once the Vertex AI API is enabled on the GCP project.)
extraction:
  provider: ollama
  model: gpt-oss:120b
  max_tokens: 8192
  temperature: 0.0            # deterministic-ish extraction
  # Number of retries when the quote-span validation guardrail rejects output.
  max_quote_span_retries: 2

# Low-volume contradiction judgment (stronger reasoning).
judgment:
  provider: ollama
  model: gpt-oss:120b
  max_tokens: 2048
  temperature: 0.0

embedding:
  # Hybrid-search embeddings (Checkpoint 6). FastEmbed = ONNX, CPU-only, no torch.
  provider: fastembed
  model: BAAI/bge-small-en-v1.5
  dimension: 384

# Conversational chatbot (LangGraph orchestrator + agents). Same "config-driven,
# never hardcoded" rule as extraction/judgment above.
chat:
  # Routing + tool-calling + multi-step analysis — needs the strongest reasoning.
  orchestrator:
    provider: ollama
    model: gpt-oss:120b
    temperature: 0.2
    max_tokens: 4096
  # Final streamed, grounded answer shown to the user.
  synthesis:
    provider: ollama
    model: gpt-oss:120b
    temperature: 0.3
    max_tokens: 4096
    # Reasoning OFF for a dramatically faster time-to-first-token. gpt-oss
    # "thinks" in a separate hidden phase that emits no `content`, so with
    # reasoning on the user stares at a spinner for the entire (slow, free-tier)
    # thinking phase before a single word streams. Synthesis is a grounded
    # rewrite of already-retrieved claims — a formatting/faithfulness task, not
    # a reasoning one — and the output guardrail still verifies grounding, so
    # dropping chain-of-thought here trades little quality for a large latency
    # win. Flip back to null (default: on) if answer quality regresses.
    reasoning: false
  # Fast scope/intent/safety classifier gating every turn — small model, low
  # latency, deterministic. Reasoning disabled: this only ever emits one
  # category/verdict word, and gpt-oss's chain-of-thought would otherwise eat
  # the whole token budget before reaching that word (see chatbot/llm.py).
  guardrail:
    provider: ollama
    model: gpt-oss:20b
    temperature: 0.0
    max_tokens: 512
    reasoning: false
